<!DOCTYPE html>
<html lang="no">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Umbi – Venteliste</title>
  <link rel="icon" type="image/png" href="favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background-color: #1F1914;
      overscroll-behavior: none;
      font-family: 'Lora', Georgia, serif;
    }

    .video-bg {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100lvh;
      object-fit: cover;
      object-position: center center;
      z-index: 0;
    }

    .content {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      z-index: 2;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: space-between;
      padding: calc(env(safe-area-inset-top, 0px) + 22dvh) 24px calc(env(safe-area-inset-bottom, 0px) + 10dvh);
    }

    /* ── Page-load animations ── */
    @keyframes fadeInUp {
      from {
        opacity: 0;
        transform: translateY(22px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .logo-group {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
      animation: fadeInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both 0.2s;
    }

    .logo {
      max-width: 240px;
      width: 100%;
    }

    .tagline {
      font-size: 15px;
      color: rgba(255, 239, 224, 0.8);
      letter-spacing: 0.01em;
      text-align: center;
    }

    /* ── Waitlist ── */
    .waitlist {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 460px;
      animation: fadeInUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both 0.45s;
    }

    /* Swap area: form / spinner / message all share the same space.
       min-height prevents layout jump when form is pulled out of flow. */
    .waitlist-swap {
      position: relative;
      width: 100%;
      min-height: 52px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .waitlist-form {
      display: flex;
      width: 100%;
      gap: 8px;
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .waitlist-form.collapsing {
      opacity: 0;
      transform: translateY(-10px) scale(0.97);
      pointer-events: none;
    }

    /* Pulled out of flow after fade — wrapper holds size via min-height */
    .waitlist-form.gone {
      position: absolute;
      visibility: hidden;
      pointer-events: none;
    }

    .waitlist-input {
      flex: 1;
      padding: 13px 16px;
      font-size: 15px;
      font-family: system-ui, sans-serif;
      border: none;
      outline: none;
      background: rgba(255, 239, 224, 0.25);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      color: rgba(31, 25, 20, 0.6);
      border-radius: 12px;
      border: 1px solid rgba(255, 239, 224, 0.3);
      transition: background 0.2s, border-color 0.2s;
    }

    .waitlist-input::placeholder {
      color: rgba(31, 25, 20, 0.5);
    }

    .waitlist-input:focus {
      background: rgba(255, 239, 224, 0.22);
      border-color: rgba(255, 239, 224, 0.45);
      outline: none;
    }

    .waitlist-input:not(:placeholder-shown) {
      background: rgba(255, 239, 224, 0.2);
      border-color: rgba(255, 239, 224, 0.4);
      color: rgba(31, 25, 20, 0.6);
    }

    .waitlist-input:-webkit-autofill,
    .waitlist-input:-webkit-autofill:hover,
    .waitlist-input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px rgba(255, 239, 224, 0.2) inset !important;
      -webkit-text-fill-color: #FFEFE0 !important;
      border-color: rgba(255, 239, 224, 0.4) !important;
      transition: background-color 9999s ease;
    }

    .waitlist-btn {
      padding: 13px 20px;
      font-size: 14px;
      font-weight: 600;
      font-family: system-ui, sans-serif;
      border: none;
      background: #FFEFE0;
      color: #1F1914;
      cursor: pointer;
      white-space: nowrap;
      border-radius: 12px;
      letter-spacing: 0.01em;
      transition: background 0.2s, transform 0.1s;
    }

    .waitlist-btn:hover { background: #ffe8d0; }
    .waitlist-btn:active { transform: scale(0.97); }

    /* ── Spinner ── */
    .hole-wrapper {
      position: absolute;
      opacity: 0;
      transform: scale(0);
      transition: opacity 0.35s ease, transform 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
      pointer-events: none;
    }

    .hole-wrapper.visible {
      opacity: 1;
      transform: scale(1);
    }

    .hole-wrapper.exit {
      opacity: 0;
      transform: scale(0.6);
      transition: opacity 0.28s ease, transform 0.28s cubic-bezier(0.4, 0, 1, 1);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .hole {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      border: 2.5px solid rgba(255, 239, 224, 0.12);
      border-top-color: rgba(255, 239, 224, 0.95);
      border-right-color: rgba(255, 239, 224, 0.45);
      animation: spin 0.75s linear infinite;
      box-shadow: 0 0 16px rgba(255, 239, 224, 0.08);
    }

    /* ── Feedback message ── */
    .waitlist-msg {
      position: absolute;
      width: 100%;
      font-size: 15px;
      font-family: 'Lora', Georgia, serif;
      color: rgba(255, 239, 224, 0.85);
      text-align: center;
      letter-spacing: 0.01em;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.5s ease, transform 0.5s cubic-bezier(0.22, 1, 0.36, 1);
      pointer-events: none;
    }

    .waitlist-msg.visible {
      opacity: 1;
      transform: translateY(0);
    }

    /* ── Mobile ── */
    @media (max-width: 600px) {
      .content {
        padding: calc(env(safe-area-inset-top, 0px) + 22dvh) 0 calc(env(safe-area-inset-bottom, 0px) + 28px);
        justify-content: space-between;
      }

      .waitlist {
        width: 90%;
        max-width: 90%;
      }

      /* input (50px) + gap (10px) + button (50px) = 110px */
      .waitlist-swap {
        min-height: 112px;
      }

      .waitlist-form {
        flex-direction: column;
        gap: 10px;
      }

      .waitlist-input,
      .waitlist-btn {
        width: 100%;
        max-width: 100%;
        text-align: center;
        white-space: normal;
        box-sizing: border-box;
      }
    }
  </style>
</head>
<body>

  <video class="video-bg" autoplay muted loop playsinline>
    <source src="bakgrunnsvideo" type="video/mp4">
  </video>

  <div class="content">
    <div class="logo-group">
      <img class="logo" src="Layer_1.png" alt="Umbi">
      <p class="tagline">Femstjernes matsopp rett fra kjøkkenbenken.</p>
    </div>

    <div class="waitlist">
      <div class="waitlist-swap">
        <form class="waitlist-form" id="form" onsubmit="handleSubmit(event)">
          <input
            class="waitlist-input"
            type="email"
            name="email"
            placeholder="Din e-postadresse"
            required
            autocomplete="email"
          >
          <button class="waitlist-btn" type="submit">Sett meg på venteliste</button>
        </form>
        <div class="hole-wrapper" id="holeWrapper">
          <div class="hole"></div>
        </div>
        <p class="waitlist-msg" id="msg">Takk! Du er nå på ventelisten.</p>
      </div>
    </div>
  </div>

  <script>
    function handleSubmit(e) {
      e.preventDefault();
      const form = document.getElementById('form');
      const holeWrapper = document.getElementById('holeWrapper');
      const msg = document.getElementById('msg');

      // 1. Form fades out and slides up (0–350ms)
      form.classList.add('collapsing');

      setTimeout(() => {
        // 2. Pull form out of flow; spinner pops in
        form.classList.add('gone');
        requestAnimationFrame(() => {
          holeWrapper.classList.add('visible');
        });

        // 3. After spinning, spinner exits
        setTimeout(() => {
          holeWrapper.classList.add('exit');

          // 4. Message fades in after spinner gone
          setTimeout(() => {
            holeWrapper.classList.remove('visible', 'exit');
            msg.classList.add('visible');
          }, 300);
        }, 1050);
      }, 350);
    }
  </script>

</body>
</html>
